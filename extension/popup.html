<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #6c5ce7;
    }
    #extract-btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #6c5ce7;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #extract-btn:hover:not(:disabled) {
      background: #5b4bd5;
    }
    #extract-btn:disabled {
      opacity: 0.7;
      cursor: wait;
    }
    #ready-view { display: none; }
    #instructions-view { display: none; }
    #loading-view { text-align: center; color: #999; padding: 8px 0; }
    #progress-container {
      margin-top: 12px;
      display: none;
    }
    #progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #e9e6f7;
      border-radius: 3px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #6c5ce7;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    #progress-label {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      min-height: 18px;
    }
    #status.error { color: #e74c3c; }
    #status.success { color: #27ae60; }
    .instructions {
      padding: 10px;
      background: #f8f7ff;
      border-radius: 8px;
      line-height: 1.6;
    }
    .instructions ol {
      margin: 0;
      padding-left: 20px;
    }
    .instructions li { margin-bottom: 4px; }
  </style>
</head>
<body>
  <h2>Partiful Name Extractor</h2>

  <div id="loading-view">Checking page...</div>

  <div id="instructions-view">
    <div class="instructions">
      <ol>
        <li>Go to a Partiful event page</li>
        <li>Make sure you're logged in and RSVP'd</li>
        <li>Open the <strong>guest list</strong> (click "View all")</li>
        <li>Then click the extension icon again</li>
      </ol>
    </div>
  </div>

  <div id="ready-view">
    <button id="extract-btn">Extract Names</button>
    <div id="progress-container">
      <div id="progress-bar-bg"><div id="progress-bar"></div></div>
      <div id="progress-label"></div>
    </div>
    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
