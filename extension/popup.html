<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #6c5ce7;
    }
    ol {
      margin: 0;
      padding-left: 20px;
      line-height: 1.6;
    }
    li { margin-bottom: 4px; }
    .note {
      margin-top: 12px;
      padding: 8px;
      background: #f8f7ff;
      border-radius: 6px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h2>Partiful Name Extractor</h2>
  <ol>
    <li>Go to a Partiful event page</li>
    <li>Click the <strong>Extract Names</strong> button (bottom-right)</li>
    <li>A CSV file will download automatically</li>
  </ol>
  <div class="note">
    The button only appears on <code>partiful.com/e/...</code> pages.
    You must be logged in and able to see the guest list.
  </div>
</body>
</html>
